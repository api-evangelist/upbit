  /orders/cancel_and_new:
    post:
      operationId: cancelAndReplaceOrder
      summary: Cancel and replace order
      description: >-
        Atomically cancels an existing order and places a new order. Either
        prev_order_uuid or prev_order_identifier must be provided (not both).
      tags:
        - Exchange - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_ord_type
              properties:
                prev_order_uuid:
                  type: string
                  description: UUID of the order to cancel (mutually exclusive with prev_order_identifier)
                prev_order_identifier:
                  type: string
                  description: Client identifier of the order to cancel (mutually exclusive with prev_order_uuid)
                new_ord_type:
                  type: string
                  enum: [limit, price, market, best]
                  description: New order type
                new_volume:
                  type: string
                  description: New order volume (decimal string)
                new_price:
                  type: string
                  description: New order price (decimal string)
                new_identifier:
                  type: string
                  description: New client order identifier
                new_time_in_force:
                  type: string
                  enum: [ioc, fok]
                new_smp_type:
                  type: string
                  enum: [cancel_newest, cancel_oldest, cancel_both]
      responses:
        '201':
          description: Order cancelled and new order created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OrderResponse'
                  - type: object
                    properties:
                      new_order_uuid:
                        type: string
                        description: UUID of the newly created replacement order
        '400':
          description: Bad request
        '401':
          description: Unauthorized
