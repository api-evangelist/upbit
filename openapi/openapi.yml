                $ref: '#/components/schemas/DepositResponse'
        '401':
          description: Unauthorized
  /deposits:
    get:
      operationId: listDeposits
      summary: List deposits
      description: >-
        Returns a list of deposits for the authenticated account with optional filters.
      tags:
        - Exchange - Deposits
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: query
          required: false
          schema:
            type: string
          description: Filter by currency code
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: Filter by deposit state
        - name: uuids[]
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by deposit UUIDs
        - name: txids[]
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          description: Filter by blockchain transaction IDs
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Number of results per page
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number
        - name: order_by
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start of date range
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End of date range
      responses:
        '200':
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepositResponse'
        '401':
          description: Unauthorized
  /deposits/krw:
    post:
      operationId: depositKrw
      summary: Request KRW deposit
      description: >-
        Initiates a KRW fiat deposit with two-factor authentication verification.
      tags:
        - Exchange - Deposits
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - two_factor_type
              properties:
                amount:
                  type: string
                  description: Deposit amount in KRW (decimal string)
                two_factor_type:
                  type: string
                  enum: [kakao, naver, hana]
                  description: Two-factor authentication provider
      responses:
        '201':
          description: KRW deposit request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepositResponse'
        '401':
          description: Unauthorized
  /travel_rule/vasps:
    get:
      operationId: listTravelRuleVasps
      summary: List Travel Rule VASPs
      description: >-
        Returns the list of Virtual Asset Service Providers (VASPs) registered for
        Travel Rule compliance, including deposit and withdrawal availability.
      tags:
        - Exchange - Travel Rule
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of VASPs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    depositable:
                      type: boolean
                      description: Whether deposits from this VASP are possible
                    vasp_uuid:
                      type: string
                      description: VASP unique identifier
                    vasp_name:
                      type: string
                      description: VASP display name
                    withdrawable:
                      type: boolean
                      description: Whether withdrawals to this VASP are possible
        '401':
          description: Unauthorized
  /travel_rule/deposit/uuid:
    post:
      operationId: verifyTravelRuleByUuid
      summary: Verify deposit owner by UUID
      description: >-
        Verifies the account ownership for a deposit under Travel Rule requirements using
        the deposit UUID. Rate limit is 1 request per 10 minutes per deposit case.
      tags:
        - Exchange - Travel Rule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deposit_uuid
                - vasp_uuid
              properties:
                deposit_uuid:
                  type: string
                  description: Upbit deposit UUID to verify
                vasp_uuid:
                  type: string
                  description: Originating VASP UUID
      responses:
        '200':
          description: Travel Rule verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deposit_uuid:
                    type: string
                  deposit_state:
                    type: string
                  verification_result:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded (1 per 10 min per deposit case)
  /travel_rule/deposit/txid:
    post:
      operationId: verifyTravelRuleByTxid
      summary: Verify deposit owner by TxID
      description: >-
        Verifies the account ownership for a deposit under Travel Rule requirements using
        the blockchain transaction ID. Rate limit is 1 request per 10 minutes per deposit case.
      tags:
        - Exchange - Travel Rule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vasp_uuid
                - txid
                - currency
                - net_type
              properties:
                vasp_uuid:
                  type: string
                  description: Originating VASP UUID
                txid:
                  type: string
                  description: Blockchain transaction ID
                currency:
                  type: string
                  description: Currency code
                net_type:
                  type: string
                  description: Network type
      responses:
        '200':
          description: Travel Rule verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deposit_uuid:
                    type: string
                  verification_result:
                    type: string
                  deposit_state:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded
  /status/wallet:
    get:
      operationId: getServiceStatus
      summary: Get wallet service status
      description: >-
        Returns the current operational status of wallet services for all currencies
        including block sync status.
      tags:
        - Exchange - Service
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of wallet service statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    currency:
                      type: string
                      description: Currency code
                    wallet_state:
                      type: string
                      description: Wallet state (e.g., working, withdraw_only, deposit_only, paused)
                    block_elapsed_minutes:
                      type: number
                      nullable: true
                      description: Minutes since last block (null if N/A)
                    net_type:
                      type: string
                      description: Network type
                    network_name:
                      type: string
                      description: Network name
        '401':
          description: Unauthorized
  /api_keys:
    get:
      operationId: listApiKeys
      summary: List API keys
      description: >-
        Returns all API keys associated with the authenticated account along with
        their expiration dates.
      tags:
        - Exchange - Service
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    access_key:
                      type: string
                      description: API access key (masked)
                    expire_at:
                      type: string
                      format: date-time
                      description: API key expiration time
        '401':
          description: Unauthorized
